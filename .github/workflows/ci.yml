name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS, Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.10", "6.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@v4.2.3
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build --configuration debug

      - name: Build (release)
        run: swift build --configuration release

      - name: Run tests
        run: swift test --configuration debug --parallel --verbose 2>&1 | tee test_output.txt

      - name: Parse test results
        id: test_count
        if: github.ref == 'refs/heads/main' && matrix.swift == '6.0'
        run: |
          # Swift Testing uses "Test run with N tests passed" style output
          # XCTest uses "Test Case '...' passed" style output
          # Count both to support either runner format
          PASSED=0
          FAILED=0

          # Swift Testing format: "X tests passed"
          ST_PASSED=$(grep -oE '[0-9]+ tests? passed' test_output.txt | grep -oE '[0-9]+' | tail -1 || true)
          ST_FAILED=$(grep -oE '[0-9]+ tests? failed' test_output.txt | grep -oE '[0-9]+' | tail -1 || true)

          # XCTest format: "Test Case '...' passed/failed"
          XC_PASSED=$(grep -c "Test Case '.*' passed" test_output.txt || true)
          XC_FAILED=$(grep -c "Test Case '.*' failed" test_output.txt || true)

          # Use whichever gave results
          PASSED=$(( ${ST_PASSED:-0} + ${XC_PASSED:-0} ))
          FAILED=$(( ${ST_FAILED:-0} + ${XC_FAILED:-0} ))

          printf 'passed=%s\n' "$PASSED" >> "$GITHUB_OUTPUT"
          printf 'failed=%s\n' "$FAILED" >> "$GITHUB_OUTPUT"
          echo "Tests passed: ${PASSED}, failed: ${FAILED}"

      - name: Update test-count badge Gist
        if: github.ref == 'refs/heads/main' && matrix.swift == '6.0'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.TEST_COUNT_GIST_ID }}
          PASSED: ${{ steps.test_count.outputs.passed }}
          FAILED: ${{ steps.test_count.outputs.failed }}
        run: |
          # Skip silently if secrets are not configured yet
          if [ -z "${GIST_TOKEN}" ] || [ -z "${GIST_ID}" ]; then
            echo "GIST_TOKEN or TEST_COUNT_GIST_ID secret not set — skipping badge update"
            exit 0
          fi

          COLOR="brightgreen"
          if [ "$FAILED" -gt "0" ]; then
            COLOR="red"
            LABEL="${PASSED} passed, ${FAILED} failed"
          else
            LABEL="${PASSED} passed"
          fi

          PAYLOAD=$(printf '{"files":{"test-count.json":{"content":"{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"%s\",\"color\":\"%s\"}"}}}' "$LABEL" "$COLOR")

          curl -s -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/gists/${GIST_ID}"

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@v4.2.3
        with:
          path: |
            .build/checkouts
            .build/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: SwiftLint
        run: swift package plugin --allow-writing-to-package-directory swiftlint --strict
