name: Auto Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '.spi.yml'

permissions:
  contents: write

jobs:
  auto-tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Skip commits made by this workflow (README version bump) to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip release]') && github.actor != 'github-actions[bot]'"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        shell: bash
        run: |
          # Get latest semver tag (fallback to v0.0.0 if none)
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          LATEST=${LATEST:-v0.0.0}
          echo "Latest tag: ${LATEST}"

          # Strip leading 'v'
          CURRENT=${LATEST#v}
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Check if VERSION file exists and contains a different version
          if [ -f VERSION ]; then
            FILE_VER=$(cat VERSION | tr -d '[:space:]')
            # Strip leading 'v' from file version if present
            FILE_VER=${FILE_VER#v}
            if [ "$FILE_VER" != "$CURRENT" ]; then
              echo "VERSION file override: ${FILE_VER}"
              NEXT="v${FILE_VER}"
            else
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          else
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Next version: ${NEXT}"
          # Version without leading 'v' for use in README
          NEXT_BARE=${NEXT#v}
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "next_bare=${NEXT_BARE}" >> "$GITHUB_OUTPUT"
          echo "current=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        id: check_tag
        shell: bash
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "Tag ${NEXT} already exists — skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.check_tag.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update versioned files
        if: steps.check_tag.outputs.skip == 'false'
        shell: bash
        run: |
          NEXT_BARE="${{ steps.version.outputs.next_bare }}"
          TODAY=$(date -u +%Y-%m-%d)
          CHANGED_FILES=""

          # ── README: bump SPM snippet version ─────────────────────────────────
          sed -i "s|\.package(url: \"https://github.com/kanchanproseth/TransformationSwiftUI.git\", from: \"[^\"]*\")|.package(url: \"https://github.com/kanchanproseth/TransformationSwiftUI.git\", from: \"${NEXT_BARE}\")|g" README.md
          if ! git diff --quiet README.md; then
            CHANGED_FILES="$CHANGED_FILES README.md"
          fi

          # ── VERSION file ──────────────────────────────────────────────────────
          echo "${NEXT_BARE}" > VERSION
          if ! git diff --quiet VERSION; then
            CHANGED_FILES="$CHANGED_FILES VERSION"
          fi

          # ── docs/API.md: bump footer version line ─────────────────────────────
          if [ -f docs/API.md ]; then
            sed -i "s|Generated from TransformationSwiftUI v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*|Generated from TransformationSwiftUI v${NEXT_BARE}|g" docs/API.md
            if ! git diff --quiet docs/API.md; then
              CHANGED_FILES="$CHANGED_FILES docs/API.md"
            fi
          fi

          # ── CHANGELOG.md: rotate [Unreleased] → [X.Y.Z] ─────────────────────
          if [ -f CHANGELOG.md ]; then
            # Replace the [Unreleased] heading with the versioned heading
            sed -i "s|^## \[Unreleased\]$|## [${NEXT_BARE}] — ${TODAY}|" CHANGELOG.md

            # Insert new empty [Unreleased] section before the newly-versioned heading
            sed -i "s|^## \[${NEXT_BARE}\] — ${TODAY}$|## [Unreleased]\n\n_Nothing yet._\n\n---\n\n## [${NEXT_BARE}] — ${TODAY}|" CHANGELOG.md

            # Update or append footer reference links
            # Remove old [Unreleased] link if it exists
            sed -i "/^\[Unreleased\]: .*/d" CHANGELOG.md

            # Update existing versioned link or append new one at EOF
            PREV_TAG="${{ steps.version.outputs.current }}"
            PREV_BARE="${PREV_TAG#v}"

            if grep -q "^\[${PREV_BARE}\]: " CHANGELOG.md; then
              # Insert new links before the first existing link line
              sed -i "s|^\(\[${PREV_BARE}\]: .*\)$|[Unreleased]: https://github.com/kanchanproseth/TransformationSwiftUI/compare/v${NEXT_BARE}...HEAD\n[${NEXT_BARE}]: https://github.com/kanchanproseth/TransformationSwiftUI/compare/${PREV_TAG}...v${NEXT_BARE}\n\1|" CHANGELOG.md
            else
              # No prior link block — append both links
              printf '\n[Unreleased]: https://github.com/kanchanproseth/TransformationSwiftUI/compare/v%s...HEAD\n[%s]: https://github.com/kanchanproseth/TransformationSwiftUI/releases/tag/v%s\n' \
                "${NEXT_BARE}" "${NEXT_BARE}" "${NEXT_BARE}" >> CHANGELOG.md
            fi

            if ! git diff --quiet CHANGELOG.md; then
              CHANGED_FILES="$CHANGED_FILES CHANGELOG.md"
            fi
          fi

          # ── Commit all changed files together ─────────────────────────────────
          if [ -n "$CHANGED_FILES" ]; then
            # shellcheck disable=SC2086
            git add $CHANGED_FILES
            git commit -m "chore: release v${NEXT_BARE} — bump version, changelog, and docs [skip release]"
            git push origin main
          else
            echo "All versioned files already up to date"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.skip == 'false'
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git tag "$NEXT" -m "Release ${NEXT}"
          git push origin "$NEXT"
          echo "Tagged and pushed ${NEXT}"
